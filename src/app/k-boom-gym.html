<h1 style="text-align: center; font-size: 99px; font-weight: bold; color: red; margin-top: 20px;">
  K-BooM
</h1>


<img src="bomba.png" class="bomba-img" alt="Bomba">

<!-- Botones del Inicio -->

<div *ngIf="!verClases  && !mostrarFotos" style=
"display: flex;
justify-content: center;
gap: 20px;
margin-top: 50px  
">

<button (click)="mostrarGaleria()"
style="
    
    font-size: 28px;      /* tamaño grande */
    font-weight: bold;    /* negrita */
    padding: 15px 40px;   /* tamaño del botón */
    border-radius: 12px;  /* bordes redondeados */
    background-color: orange; /* color de fondo */
    color: white;         /* color del texto */
    border: none;
    cursor: pointer;
  "
  >
  Fotos
</button>

 <button (click)="mostrarClases()"
  style="
    
    font-size: 28px;      /* tamaño grande */
    font-weight: bold;    /* negrita */
    padding: 15px 40px;   /* tamaño del botón */
    border-radius: 12px;  /* bordes redondeados */
    background-color: orange; /* color de fondo */
    color: white;         /* color del texto */
    border: none;
    cursor: pointer;
    "
  >
  Clases
</button>

</div>

<!-- Seccion clases  -->

<div *ngIf="verClases" class="clases-container">
          <h2>Clases del Gymnasio</h2>
  
          <ul>
              <li *ngFor="let clase of listaClases">
                    {{ clase.Nombre }} - {{clase.hora}}
              </li>
            
          </ul>
 
            <button class="boton-atras" (click)="volverInicio()">
               Atrás
            </button>

   </div>

<!-- Sección Fotos -->

<div *ngIf="mostrarFotos" class="galeria-container">
  <div class="galeria">
    <img *ngFor="let foto of fotos; let i = index"
     [src]="foto" 
     alt="Foto" 
     class="foto-item"
     (click)="abrirFoto(i)">
  </div>

   <!-- Lightbox -->
    <div class="lightbox" *ngIf="fotoSeleccionada">

   <!-- Flecha Izquierda  -->

     <div class="flecha izquierda" *ngIf="indiceFoto > 0" (click)="fotoAnterior()">&#10094;</div>

      <img [src]="fotoSeleccionada" alt="Foto ampliada">
    
      <!-- Flecha Derecha -->

      <div class="flecha derecha" *ngIf="indiceFoto < fotos.length -1" (click)="siguienteFoto()">&#10095;</div>

      <!-- Cerrar hacuiendo clic fuera -->

      <div class="cerrar" (click)="cerrarLightbox()"></div>
</div>

  <button class="boton-atras" (click)="volverInicio()">
Atrás
</button>

</div>
